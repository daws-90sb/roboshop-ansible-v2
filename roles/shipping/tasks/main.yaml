- name: app setup
  import_role: 
    name: common
    tasks_from: app-setup

- name: java setup
  import_role:
     name: common
     tasks_from: java

- name: systemd setup
  import_role:
    name: common
    tasks_from: systemd-setup

- name: install mysql
  package:
    name: mysql
    state: present
  loop:
  - mysql
  
- name: Install python dependencies
  pip:
    name: PyMySql
    executable: pip3.9

- name: load mysql data
  community.mysql.mysql_db:
    state: import
    name: all
    login_user: "{{ mysql_login_user}}"
    login_password: "{{ mysql_root_password }}"
    login_host: "{{ MYSQL_HOST }}" # the username and password will conenct to this host nad then it will load below script files
    target: "{{ item }}"
  loop:
  - /app/db/schema.sql
  - /app/db/app-user.sql
  - /app/db/master-data.sql

- name: restart
  import_role:
    name: common
    tasks_from: restart
